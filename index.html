<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VKSND Gia Lai — Dashboard 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#050c1a}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none}
#splash{position:fixed;inset:0;background:#050c1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.ring{width:44px;height:44px;border-radius:50%;border:3px solid rgba(0,212,255,.15);border-top-color:#00d4ff;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#7a8ab5;font-family:sans-serif;font-size:13px}
</style>
</head>
<body>
<div id="splash">
  <div class="ring"></div>
  <p>Đang tải Dashboard VKSND Gia Lai...</p>
</div>
<iframe
  src="https://script.google.com/macros/s/AKfycbzuuUbReIflxFNR1nIrG3D4YgHJZ21C4JXrdhW4CsvziFRa4R-3LHa2ChpLQEJPBknDAw/exec"
  onload="document.getElementById('splash').classList.add('hide')"
  allow="fullscreen"
></iframe>
</body>
</html>
