<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="Dashboard Công tác VKSND tỉnh Gia Lai 2026"/>
<title>VKSND Gia Lai — Dashboard 2026</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#050c1a}
  iframe{width:100%;height:100vh;border:none;display:block}
  .loading{position:fixed;inset:0;background:#050c1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
  .ring{width:40px;height:40px;border-radius:50%;border:3px solid rgba(0,212,255,.2);border-top-color:#00d4ff;animation:spin .75s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .txt{color:#7a8ab5;font-family:sans-serif;font-size:13px}
</style>
</head>
<body>
<div class="loading" id="ld">
  <div class="ring"></div>
  <div class="txt">Đang tải Dashboard VKSND Gia Lai...</div>
</div>
<iframe
  src="https://script.google.com/macros/s/AKfycbzuuUbReIflxFNR1nIrG3D4YgHJZ21C4JXrdhW4CsvziFRa4R-3LHa2ChpLQEJPBknDAw/exec"
  id="frame"
  allow="fullscreen"
  onload="document.getElementById('ld').style.display='none'"
></iframe>
</body>
</html>
